        - generic [ref=e363]: Frequently asked
      - heading "Questions structural engineers tend to ask first." [level=2] [ref=e364]
      - generic [ref=e365]:
        - generic [ref=e366]:
          - button "01 Does Civil Agent replace my structural engineer?" [expanded] [ref=e367] [cursor=pointer]:
            - generic [ref=e368]:
              - generic [ref=e369]: "01"
              - generic [ref=e370]: Does Civil Agent replace my structural engineer?
            - img [ref=e371]
          - paragraph [ref=e375]: No. Civil Agent produces preliminary, code-compliant schemes for the early design phase. The output is a starting point for the structural consultant, with traceable load paths and auditable assumptions.
        - generic [ref=e376]:
          - button "02 What structural systems are supported?" [ref=e377] [cursor=pointer]:
            - generic [ref=e378]:
              - generic [ref=e379]: "02"
              - generic [ref=e380]: What structural systems are supported?
            - img [ref=e381]
          - paragraph [ref=e383]: "At launch: reinforced concrete flat plate, flat slab with drops, one-way joist, two-way beam systems, and steel composite beam and column schemes with braced or moment frames."
        - generic [ref=e384]:
          - button "03 Which codes are implemented?" [ref=e385] [cursor=pointer]:
            - generic [ref=e386]:
              - generic [ref=e387]: "03"
              - generic [ref=e388]: Which codes are implemented?
            - img [ref=e389]
          - paragraph [ref=e391]: ACI 318-19 and AISC 360-22 are used for member design. ASCE 7-22 supplies load references. Additional jurisdictions can be evaluated during onboarding.
        - generic [ref=e392]:
          - button "04 How is this different from a generative AI tool?" [ref=e393] [cursor=pointer]:
            - generic [ref=e394]:
              - generic [ref=e395]: "04"
              - generic [ref=e396]: How is this different from a generative AI tool?
            - img [ref=e397]
          - paragraph [ref=e399]: Civil Agent is constraint driven and physics based. The schemes come from a deterministic solver that respects equilibrium, serviceability, and code limits.
        - generic [ref=e400]:
          - button "05 Does the workflow require a new modeling tool?" [ref=e401] [cursor=pointer]:
            - generic [ref=e402]:
              - generic [ref=e403]: "05"
              - generic [ref=e404]: Does the workflow require a new modeling tool?
            - img [ref=e405]
          - paragraph [ref=e407]: No. Civil Agent ingests Rhino, Revit, IFC, and drawing exports, then writes back a structured report and exchangeable model data for consultant workflows.
