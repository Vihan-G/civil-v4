                - generic [ref=e354]: Which codes are implemented?
              - img [ref=e355]
            - paragraph [ref=e357]: ACI 318-19 and AISC 360-22 are used for member design. ASCE 7-22 supplies load references. Additional jurisdictions can be evaluated during onboarding.
          - generic [ref=e358]:
