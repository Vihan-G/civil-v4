                - generic [ref=e362]: How is this different from a generative AI tool?
              - img [ref=e363]
            - paragraph [ref=e365]: Civil Agent is constraint driven and physics based. The schemes come from a deterministic solver that respects equilibrium, serviceability, and code limits.
          - generic [ref=e366]:
            - button "05 Does the workflow require a new modeling tool?" [ref=e367] [cursor=pointer]:
