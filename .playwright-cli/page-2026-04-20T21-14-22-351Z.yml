            - button "01 Does Civil Agent replace my structural engineer?" [expanded] [ref=e360] [cursor=pointer]:
              - generic [ref=e361]:
                - generic [ref=e362]: "01"
                - generic [ref=e363]: Does Civil Agent replace my structural engineer?
              - img [ref=e364]
            - paragraph [ref=e368]: No. Civil Agent produces preliminary, code-compliant schemes for the early design phase. The output is a starting point for the structural consultant, with traceable load paths and auditable assumptions.
          - generic [ref=e369]:
            - button "02 What structural systems are supported?" [ref=e370] [cursor=pointer]:
              - generic [ref=e371]:
                - generic [ref=e372]: "02"
                - generic [ref=e373]: What structural systems are supported?
              - img [ref=e374]
            - paragraph [ref=e376]: "At launch: reinforced concrete flat plate, flat slab with drops, one-way joist, two-way beam systems, and steel composite beam and column schemes with braced or moment frames."
          - generic [ref=e377]:
            - button "03 Which codes are implemented?" [ref=e378] [cursor=pointer]:
              - generic [ref=e379]:
                - generic [ref=e380]: "03"
                - generic [ref=e381]: Which codes are implemented?
              - img [ref=e382]
            - paragraph [ref=e384]: ACI 318-19 and AISC 360-22 are used for member design. ASCE 7-22 supplies load references. Additional jurisdictions can be evaluated during onboarding.
          - generic [ref=e385]:
            - button "04 How is this different from a generative AI tool?" [ref=e386] [cursor=pointer]:
              - generic [ref=e387]:
                - generic [ref=e388]: "04"
                - generic [ref=e389]: How is this different from a generative AI tool?
              - img [ref=e390]
            - paragraph [ref=e392]: Civil Agent is constraint driven and physics based. The schemes come from a deterministic solver that respects equilibrium, serviceability, and code limits.
          - generic [ref=e393]:
            - button "05 Does the workflow require a new modeling tool?" [ref=e394] [cursor=pointer]:
              - generic [ref=e395]:
                - generic [ref=e396]: "05"
                - generic [ref=e397]: Does the workflow require a new modeling tool?
              - img [ref=e398]
            - paragraph [ref=e400]: No. Civil Agent ingests Rhino, Revit, IFC, and drawing exports, then writes back a structured report and exchangeable model data for consultant workflows.
