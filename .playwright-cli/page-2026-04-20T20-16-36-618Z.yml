            - button "01 Does Civil Agent replace my structural engineer?" [expanded] [ref=e546] [cursor=pointer]:
              - generic [ref=e547]:
                - generic [ref=e548]: "01"
                - generic [ref=e549]: Does Civil Agent replace my structural engineer?
              - img [ref=e550]
            - paragraph [ref=e554]: No. Civil Agent produces preliminary, code-compliant schemes for the early design phase. The output is a starting point for the structural consultant, with traceable load paths and auditable assumptions.
          - generic [ref=e555]:
            - button "02 What structural systems are supported?" [ref=e556] [cursor=pointer]:
              - generic [ref=e557]:
                - generic [ref=e558]: "02"
                - generic [ref=e559]: What structural systems are supported?
              - img [ref=e560]
            - paragraph [ref=e562]: "At launch: reinforced concrete flat plate, flat slab with drops, one-way joist, two-way beam systems, and steel composite beam and column schemes with braced or moment frames."
          - generic [ref=e563]:
            - button "03 Which codes are implemented?" [ref=e564] [cursor=pointer]:
              - generic [ref=e565]:
                - generic [ref=e566]: "03"
                - generic [ref=e567]: Which codes are implemented?
              - img [ref=e568]
            - paragraph [ref=e570]: ACI 318-19 and AISC 360-22 are used for member design. ASCE 7-22 supplies load references. Additional jurisdictions can be evaluated during onboarding.
          - generic [ref=e571]:
            - button "04 How is this different from a generative AI tool?" [ref=e572] [cursor=pointer]:
              - generic [ref=e573]:
                - generic [ref=e574]: "04"
                - generic [ref=e575]: How is this different from a generative AI tool?
              - img [ref=e576]
            - paragraph [ref=e578]: Civil Agent is constraint driven and physics based. The schemes come from a deterministic solver that respects equilibrium, serviceability, and code limits.
          - generic [ref=e579]:
            - button "05 Does the workflow require a new modeling tool?" [ref=e580] [cursor=pointer]:
              - generic [ref=e581]:
                - generic [ref=e582]: "05"
                - generic [ref=e583]: Does the workflow require a new modeling tool?
              - img [ref=e584]
            - paragraph [ref=e586]: No. Civil Agent ingests Rhino, Revit, IFC, and drawing exports, then writes back a structured report and exchangeable model data for consultant workflows.
