      - heading "Questions structural engineers tend to ask first." [level=2] [ref=e359]
      - generic [ref=e360]:
        - generic [ref=e361]:
          - button "01 Does Civil Agent replace my structural engineer?" [expanded] [ref=e362] [cursor=pointer]:
            - generic [ref=e363]:
              - generic [ref=e364]: "01"
              - generic [ref=e365]: Does Civil Agent replace my structural engineer?
            - img [ref=e366]
          - paragraph [ref=e370]: No. Civil Agent produces preliminary, code-compliant schemes for the early design phase. The output is a starting point for the structural consultant, with traceable load paths and auditable assumptions.
        - generic [ref=e371]:
          - button "02 What structural systems are supported?" [ref=e372] [cursor=pointer]:
            - generic [ref=e373]:
              - generic [ref=e374]: "02"
              - generic [ref=e375]: What structural systems are supported?
            - img [ref=e376]
          - paragraph [ref=e378]: "At launch: reinforced concrete flat plate, flat slab with drops, one-way joist, two-way beam systems, and steel composite beam and column schemes with braced or moment frames."
        - generic [ref=e379]:
          - button "03 Which codes are implemented?" [ref=e380] [cursor=pointer]:
            - generic [ref=e381]:
              - generic [ref=e382]: "03"
              - generic [ref=e383]: Which codes are implemented?
            - img [ref=e384]
          - paragraph [ref=e386]: ACI 318-19 and AISC 360-22 are used for member design. ASCE 7-22 supplies load references. Additional jurisdictions can be evaluated during onboarding.
        - generic [ref=e387]:
          - button "04 How is this different from a generative AI tool?" [ref=e388] [cursor=pointer]:
            - generic [ref=e389]:
              - generic [ref=e390]: "04"
              - generic [ref=e391]: How is this different from a generative AI tool?
            - img [ref=e392]
          - paragraph [ref=e394]: Civil Agent is constraint driven and physics based. The schemes come from a deterministic solver that respects equilibrium, serviceability, and code limits.
        - generic [ref=e395]:
          - button "05 Does the workflow require a new modeling tool?" [ref=e396] [cursor=pointer]:
            - generic [ref=e397]:
              - generic [ref=e398]: "05"
              - generic [ref=e399]: Does the workflow require a new modeling tool?
            - img [ref=e400]
          - paragraph [ref=e402]: No. Civil Agent ingests Rhino, Revit, IFC, and drawing exports, then writes back a structured report and exchangeable model data for consultant workflows.
