                - generic [ref=e369]: Does Civil Agent replace my structural engineer?
              - img [ref=e370]
            - paragraph [ref=e374]: No. Civil Agent produces preliminary, code-compliant schemes for the early design phase. The output is a starting point for the structural consultant, with traceable load paths and auditable assumptions.
          - generic [ref=e375]:
            - button "02 What structural systems are supported?" [ref=e376] [cursor=pointer]:
              - generic [ref=e377]:
                - generic [ref=e378]: "02"
                - generic [ref=e379]: What structural systems are supported?
              - img [ref=e380]
            - paragraph [ref=e382]: "At launch: reinforced concrete flat plate, flat slab with drops, one-way joist, two-way beam systems, and steel composite beam and column schemes with braced or moment frames."
          - generic [ref=e383]:
            - button "03 Which codes are implemented?" [ref=e384] [cursor=pointer]:
              - generic [ref=e385]:
                - generic [ref=e386]: "03"
                - generic [ref=e387]: Which codes are implemented?
              - img [ref=e388]
            - paragraph [ref=e390]: ACI 318-19 and AISC 360-22 are used for member design. ASCE 7-22 supplies load references. Additional jurisdictions can be evaluated during onboarding.
          - generic [ref=e391]:
            - button "04 How is this different from a generative AI tool?" [ref=e392] [cursor=pointer]:
              - generic [ref=e393]:
                - generic [ref=e394]: "04"
                - generic [ref=e395]: How is this different from a generative AI tool?
              - img [ref=e396]
            - paragraph [ref=e398]: Civil Agent is constraint driven and physics based. The schemes come from a deterministic solver that respects equilibrium, serviceability, and code limits.
          - generic [ref=e399]:
            - button "05 Does the workflow require a new modeling tool?" [ref=e400] [cursor=pointer]:
              - generic [ref=e401]:
                - generic [ref=e402]: "05"
                - generic [ref=e403]: Does the workflow require a new modeling tool?
              - img [ref=e404]
            - paragraph [ref=e406]: No. Civil Agent ingests Rhino, Revit, IFC, and drawing exports, then writes back a structured report and exchangeable model data for consultant workflows.
