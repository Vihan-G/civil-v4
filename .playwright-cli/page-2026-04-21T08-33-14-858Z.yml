            - button "01 Does Civil Agent replace my structural engineer?" [expanded] [ref=e337] [cursor=pointer]:
              - generic [ref=e338]:
                - generic [ref=e339]: "01"
                - generic [ref=e340]: Does Civil Agent replace my structural engineer?
              - img [ref=e341]
            - paragraph [ref=e345]: No. Civil Agent produces preliminary, code-compliant schemes for the early design phase. The output is a starting point for the structural consultant, with traceable load paths and auditable assumptions.
          - generic [ref=e346]:
            - button "02 What structural systems are supported?" [ref=e347] [cursor=pointer]:
              - generic [ref=e348]:
                - generic [ref=e349]: "02"
                - generic [ref=e350]: What structural systems are supported?
              - img [ref=e351]
            - paragraph [ref=e353]: "At launch: reinforced concrete flat plate, flat slab with drops, one-way joist, two-way beam systems, and steel composite beam and column schemes with braced or moment frames."
          - generic [ref=e354]:
            - button "03 Which codes are implemented?" [ref=e355] [cursor=pointer]:
              - generic [ref=e356]:
                - generic [ref=e357]: "03"
                - generic [ref=e358]: Which codes are implemented?
              - img [ref=e359]
            - paragraph [ref=e361]: ACI 318-19 and AISC 360-22 are used for member design. ASCE 7-22 supplies load references. Additional jurisdictions can be evaluated during onboarding.
          - generic [ref=e362]:
            - button "04 How is this different from a generative AI tool?" [ref=e363] [cursor=pointer]:
              - generic [ref=e364]:
                - generic [ref=e365]: "04"
                - generic [ref=e366]: How is this different from a generative AI tool?
              - img [ref=e367]
            - paragraph [ref=e369]: Civil Agent is constraint driven and physics based. The schemes come from a deterministic solver that respects equilibrium, serviceability, and code limits.
          - generic [ref=e370]:
            - button "05 Does the workflow require a new modeling tool?" [ref=e371] [cursor=pointer]:
              - generic [ref=e372]:
                - generic [ref=e373]: "05"
                - generic [ref=e374]: Does the workflow require a new modeling tool?
              - img [ref=e375]
            - paragraph [ref=e377]: No. Civil Agent ingests Rhino, Revit, IFC, and drawing exports, then writes back a structured report and exchangeable model data for consultant workflows.
