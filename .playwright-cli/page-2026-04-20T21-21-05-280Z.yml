                - generic [ref=e364]: Does Civil Agent replace my structural engineer?
              - img [ref=e365]
            - paragraph [ref=e369]: No. Civil Agent produces preliminary, code-compliant schemes for the early design phase. The output is a starting point for the structural consultant, with traceable load paths and auditable assumptions.
          - generic [ref=e370]:
            - button "02 What structural systems are supported?" [ref=e371] [cursor=pointer]:
              - generic [ref=e372]:
                - generic [ref=e373]: "02"
                - generic [ref=e374]: What structural systems are supported?
              - img [ref=e375]
            - paragraph [ref=e377]: "At launch: reinforced concrete flat plate, flat slab with drops, one-way joist, two-way beam systems, and steel composite beam and column schemes with braced or moment frames."
          - generic [ref=e378]:
            - button "03 Which codes are implemented?" [ref=e379] [cursor=pointer]:
              - generic [ref=e380]:
                - generic [ref=e381]: "03"
                - generic [ref=e382]: Which codes are implemented?
              - img [ref=e383]
            - paragraph [ref=e385]: ACI 318-19 and AISC 360-22 are used for member design. ASCE 7-22 supplies load references. Additional jurisdictions can be evaluated during onboarding.
          - generic [ref=e386]:
            - button "04 How is this different from a generative AI tool?" [ref=e387] [cursor=pointer]:
              - generic [ref=e388]:
                - generic [ref=e389]: "04"
                - generic [ref=e390]: How is this different from a generative AI tool?
              - img [ref=e391]
            - paragraph [ref=e393]: Civil Agent is constraint driven and physics based. The schemes come from a deterministic solver that respects equilibrium, serviceability, and code limits.
          - generic [ref=e394]:
            - button "05 Does the workflow require a new modeling tool?" [ref=e395] [cursor=pointer]:
              - generic [ref=e396]:
                - generic [ref=e397]: "05"
                - generic [ref=e398]: Does the workflow require a new modeling tool?
              - img [ref=e399]
            - paragraph [ref=e401]: No. Civil Agent ingests Rhino, Revit, IFC, and drawing exports, then writes back a structured report and exchangeable model data for consultant workflows.
