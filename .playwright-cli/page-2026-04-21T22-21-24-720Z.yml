      - heading "Questions structural engineers tend to ask first." [level=2] [ref=e373]
      - generic [ref=e374]:
        - generic [ref=e375]:
          - button "01 Does Civil Agent replace my structural engineer?" [expanded] [ref=e376] [cursor=pointer]:
            - generic [ref=e377]:
              - generic [ref=e378]: "01"
              - generic [ref=e379]: Does Civil Agent replace my structural engineer?
            - img [ref=e380]
          - paragraph [ref=e384]: No. Civil Agent produces preliminary, code-compliant schemes for the early design phase. The output is a starting point for the structural consultant, with traceable load paths and auditable assumptions.
        - generic [ref=e385]:
          - button "02 What structural systems are supported?" [ref=e386] [cursor=pointer]:
            - generic [ref=e387]:
              - generic [ref=e388]: "02"
              - generic [ref=e389]: What structural systems are supported?
            - img [ref=e390]
          - paragraph [ref=e392]: "At launch: reinforced concrete flat plate, flat slab with drops, one-way joist, two-way beam systems, and steel composite beam and column schemes with braced or moment frames."
        - generic [ref=e393]:
          - button "03 Which codes are implemented?" [ref=e394] [cursor=pointer]:
            - generic [ref=e395]:
              - generic [ref=e396]: "03"
              - generic [ref=e397]: Which codes are implemented?
            - img [ref=e398]
          - paragraph [ref=e400]: ACI 318-19 and AISC 360-22 are used for member design. ASCE 7-22 supplies load references. Additional jurisdictions can be evaluated during onboarding.
        - generic [ref=e401]:
          - button "04 How is this different from a generative AI tool?" [ref=e402] [cursor=pointer]:
            - generic [ref=e403]:
              - generic [ref=e404]: "04"
              - generic [ref=e405]: How is this different from a generative AI tool?
            - img [ref=e406]
          - paragraph [ref=e408]: Civil Agent is constraint driven and physics based. The schemes come from a deterministic solver that respects equilibrium, serviceability, and code limits.
        - generic [ref=e409]:
          - button "05 Does the workflow require a new modeling tool?" [ref=e410] [cursor=pointer]:
            - generic [ref=e411]:
              - generic [ref=e412]: "05"
              - generic [ref=e413]: Does the workflow require a new modeling tool?
            - img [ref=e414]
          - paragraph [ref=e416]: No. Civil Agent ingests Rhino, Revit, IFC, and drawing exports, then writes back a structured report and exchangeable model data for consultant workflows.
