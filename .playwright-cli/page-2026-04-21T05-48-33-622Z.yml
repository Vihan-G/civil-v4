                - generic [ref=e364]: How is this different from a generative AI tool?
              - img [ref=e365]
            - paragraph [ref=e367]: Civil Agent is constraint driven and physics based. The schemes come from a deterministic solver that respects equilibrium, serviceability, and code limits.
          - generic [ref=e368]:
            - button "05 Does the workflow require a new modeling tool?" [ref=e369] [cursor=pointer]:
