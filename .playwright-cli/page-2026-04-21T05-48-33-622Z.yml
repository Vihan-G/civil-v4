                - generic [ref=e356]: Which codes are implemented?
              - img [ref=e357]
            - paragraph [ref=e359]: ACI 318-19 and AISC 360-22 are used for member design. ASCE 7-22 supplies load references. Additional jurisdictions can be evaluated during onboarding.
          - generic [ref=e360]:
            - button "04 How is this different from a generative AI tool?" [ref=e361] [cursor=pointer]:
