            - paragraph [ref=e373]: No. Civil Agent produces preliminary, code-compliant schemes for the early design phase. The output is a starting point for the structural consultant, with traceable load paths and auditable assumptions.
          - generic [ref=e374]:
            - button "02 What structural systems are supported?" [ref=e375] [cursor=pointer]:
              - generic [ref=e376]:
                - generic [ref=e377]: "02"
                - generic [ref=e378]: What structural systems are supported?
              - img [ref=e379]
            - paragraph [ref=e381]: "At launch: reinforced concrete flat plate, flat slab with drops, one-way joist, two-way beam systems, and steel composite beam and column schemes with braced or moment frames."
          - generic [ref=e382]:
            - button "03 Which codes are implemented?" [ref=e383] [cursor=pointer]:
              - generic [ref=e384]:
                - generic [ref=e385]: "03"
                - generic [ref=e386]: Which codes are implemented?
              - img [ref=e387]
            - paragraph [ref=e389]: ACI 318-19 and AISC 360-22 are used for member design. ASCE 7-22 supplies load references. Additional jurisdictions can be evaluated during onboarding.
          - generic [ref=e390]:
            - button "04 How is this different from a generative AI tool?" [ref=e391] [cursor=pointer]:
              - generic [ref=e392]:
                - generic [ref=e393]: "04"
                - generic [ref=e394]: How is this different from a generative AI tool?
              - img [ref=e395]
            - paragraph [ref=e397]: Civil Agent is constraint driven and physics based. The schemes come from a deterministic solver that respects equilibrium, serviceability, and code limits.
          - generic [ref=e398]:
            - button "05 Does the workflow require a new modeling tool?" [ref=e399] [cursor=pointer]:
              - generic [ref=e400]:
                - generic [ref=e401]: "05"
                - generic [ref=e402]: Does the workflow require a new modeling tool?
              - img [ref=e403]
            - paragraph [ref=e405]: No. Civil Agent ingests Rhino, Revit, IFC, and drawing exports, then writes back a structured report and exchangeable model data for consultant workflows.
